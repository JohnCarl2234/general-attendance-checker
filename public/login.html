<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0" />
    <link rel="stylesheet" href="./ui-theme.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./theme-init.js"></script>
</head>
<body class="auth-shell min-h-screen">
    <main class="auth-grid min-h-screen grid lg:grid-cols-2">
        <section class="auth-hero hidden lg:flex p-12 items-end">
            <div>
                <p class="section-label text-sm uppercase tracking-[0.3em] text-red-200 mb-4">Authorized Access</p>
                <h1 class="auth-display text-5xl font-black leading-tight mb-4">NSTP Cloud Tracker</h1>
                <p class="supporting-text text-red-100 max-w-md">Sign in with an approved admin account to manage live attendance, cloud records, and assignment changes.</p>
            </div>
        </section>

        <section class="auth-card-wrap flex items-center justify-center p-6">
            <div class="auth-card w-full max-w-md rounded-3xl shadow-xl border p-8">
                <div class="mb-6 flex items-start justify-between gap-3">
                    <div>
                        <p class="section-label text-xs uppercase tracking-[0.25em] text-red-800 font-bold mb-3">Admin Portal</p>
                        <h2 class="auth-display text-3xl font-black mb-2">Sign in</h2>
                        <p class="content-note text-sm text-slate-500">Only authorized administrators can open the editable dashboard.</p>
                    </div>
                    <button id="loginThemeToggle" class="pill-button text-sm px-3 py-2" title="Toggle theme"><span id="loginThemeIcon" class="material-symbols-rounded text-base">dark_mode</span></button>
                </div>

                <form id="loginForm" class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-bold text-slate-700 mb-2">Email</label>
                        <input id="email" type="email" autocomplete="username" required class="text-field w-full rounded-2xl border px-4 py-3 outline-none focus:ring-2 focus:ring-red-500" placeholder="admin@example.com">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                        <input id="password" type="password" autocomplete="current-password" required class="text-field w-full rounded-2xl border px-4 py-3 outline-none focus:ring-2 focus:ring-red-500" placeholder="Enter password">
                    </div>

                    <button type="submit" class="filled-button w-full rounded-2xl py-3 font-bold">Login to Admin Dashboard</button>
                </form>

                <p id="loginStatus" class="auth-status content-note mt-4 text-sm text-slate-500">Waiting for sign-in.</p>

                <div class="auth-support-links mt-8 pt-6 border-t flex items-center justify-between gap-3">
                    <a href="./viewer.html" class="text-sm font-bold underline underline-offset-4">Open viewer dashboard</a>
                    <a href="https://console.firebase.google.com/" target="_blank" rel="noreferrer" class="text-sm font-bold underline underline-offset-4">Firebase Console</a>
                </div>
            </div>
        </section>
    </main>

    <script src="./firebase-config.js"></script>
    <script type="module" src="./login.js"></script>
</body>
</html>
